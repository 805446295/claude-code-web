<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<script src="/static/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; }

.login-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
.login-box { background: #16213e; padding: 40px; border-radius: 16px; width: 360px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.login-box h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
.login-box p { color: #888; margin-bottom: 24px; font-size: 14px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #0f3460; color: #fff; font-size: 16px; outline: none; }
.login-box input:focus { border-color: #e94560; }
.login-box button { width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 8px; background: #e94560; color: #fff; font-size: 16px; cursor: pointer; font-weight: 600; }
.login-box button:hover { background: #d63850; }
.login-box .error { color: #e94560; margin-top: 12px; font-size: 14px; display: none; }

.chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 960px; margin: 0 auto; }
.chat-header { padding: 16px 20px; background: #16213e; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
.chat-header h2 { font-size: 16px; color: #fff; }
.chat-header button { padding: 6px 14px; border: 1px solid #555; border-radius: 6px; background: transparent; color: #aaa; cursor: pointer; font-size: 13px; }
.chat-header button:hover { background: #333; color: #fff; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }

.message { margin-bottom: 20px; display: flex; flex-direction: column; }
.message.user { align-items: flex-end; }
.message.assistant { align-items: flex-start; }
.message .bubble { max-width: 85%; padding: 12px 18px; border-radius: 16px; line-height: 1.6; word-break: break-word; }
.message.user .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
.message.assistant .bubble { background: #0f3460; color: #e0e0e0; border-bottom-left-radius: 4px; width: 100%; }
.message .bubble p { margin: 0 0 8px 0; }
.message .bubble p:last-child { margin-bottom: 0; }
.message .bubble pre { background: #0d1b36; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
.message .bubble code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
.message .bubble :not(pre) > code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }

/* Tool blocks */
.tool-block { margin: 6px 0; border-radius: 8px; overflow: hidden; width: 100%; }
.tool-use { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #1a3a1a; border-left: 3px solid #4caf84; cursor: pointer; font-size: 13px; user-select: none; }
.tool-use:hover { background: #1e4422; }
.tool-use .icon { font-size: 16px; flex-shrink: 0; }
.tool-use .info { flex: 1; min-width: 0; }
.tool-use .name { color: #4caf84; font-weight: 600; }
.tool-use .detail { color: #7a9f7a; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; font-family: monospace; }
.tool-use .arrow { color: #4caf84; transition: transform 0.2s; font-size: 12px; flex-shrink: 0; }
.tool-use.expanded .arrow { transform: rotate(90deg); }
.tool-result { display: none; background: #0d1b28; padding: 12px 14px; border-left: 3px solid #4caf84; }
.tool-result.open { display: block; }
.tool-result pre { margin: 0; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: #c0c0c0; max-height: 400px; overflow-y: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
.tool-error { background: #3a1a1a; border-left-color: #e94560; }
.tool-error .name { color: #e94560; }
.tool-error.tool-use { background: #3a1a1a; }

.typing-indicator { display: flex; gap: 4px; padding: 12px 18px; }
.typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: #888; animation: bounce 1.4s infinite ease-in-out; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

.input-area { padding: 16px 20px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 12px; flex-shrink: 0; }
.input-area textarea { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #0f3460; color: #fff; font-size: 15px; resize: none; outline: none; min-height: 44px; max-height: 150px; font-family: inherit; }
.input-area textarea:focus { border-color: #e94560; }
.input-area button { padding: 0 20px; border: none; border-radius: 8px; background: #e94560; color: #fff; font-size: 15px; cursor: pointer; font-weight: 600; white-space: nowrap; }
.input-area button:hover { background: #d63850; }
.input-area button:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>

<div id="loginView" class="login-container" style="display:none">
  <div class="login-box">
    <h1>Claude Chat</h1>
    <p>输入密码开始对话</p>
    <input type="password" id="passwordInput" placeholder="密码" autofocus onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">进入</button>
    <div class="error" id="loginError">密码错误</div>
  </div>
</div>

<div id="chatView" class="chat-container" style="display:none">
  <div class="chat-header">
    <h2>Claude Chat — 本机文件 + 命令</h2>
    <div>
      <button onclick="doNewChat()" style="margin-right:8px">新对话</button>
      <button onclick="doLogout()">退出</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="输入消息... (可操作本地文件、搜索代码、执行命令)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
let isStreaming = false;
function $(id) { return document.getElementById(id); }

// ——— Login ———
function doLogin() {
  const pwd = $('passwordInput').value;
  fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pwd}) })
    .then(r => r.json())
    .then(d => { if (d.success) showChat(); else $('loginError').style.display = 'block'; });
}
function doLogout() { fetch('/logout', { method: 'POST' }).then(() => showLogin()); }
function doNewChat() {
  if (isStreaming) return;
  fetch('/new-chat', { method: 'POST' })
    .then(r => r.json())
    .then(d => { if (d.success) { $('messages').innerHTML = ''; } });
}
function showLogin() { $('chatView').style.display = 'none'; $('loginView').style.display = 'flex'; $('messages').innerHTML = ''; }
function showChat() { $('loginView').style.display = 'none'; $('chatView').style.display = 'flex'; $('messageInput').focus(); }

// ——— Send ———
async function sendMessage() {
  if (isStreaming) return;
  const input = $('messageInput');
  const msg = input.value.trim();
  if (!msg) return;

  isStreaming = true;
  $('sendBtn').disabled = true;
  $('sendBtn').textContent = '发送中...';
  input.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendUserMessage(msg);

  // Create assistant message container
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';
  $('messages').appendChild(msgDiv);

  // UI elements
  let thinkingDiv = null;
  let thinkingPre = null;
  let thinkingText = '';
  let currentBubble = null;
  let fullText = '';
  let firstChunk = true;
  let activeToolBlocks = {};  // tool_id -> {block, jsonText}

  function ensureBubble() {
    if (!currentBubble) {
      currentBubble = document.createElement('div');
      currentBubble.className = 'bubble';
      currentBubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      msgDiv.appendChild(currentBubble);
      fullText = '';
      firstChunk = true;
    }
    return currentBubble;
  }

  function ensureThinking() {
    if (!thinkingDiv) {
      thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'tool-block';
      thinkingDiv.innerHTML = `
        <div class="tool-use" onclick="toggleTool(this)" style="background:#1a2a3a;border-left-color:#6a8fa8;">
          <span class="icon">💭</span>
          <span class="info">
            <span class="name" style="color:#6a8fa8;">思考过程</span>
          </span>
          <span class="arrow" style="color:#6a8fa8;">▶</span>
        </div>
        <div class="tool-result"><pre></pre></div>
      `;
      msgDiv.appendChild(thinkingDiv);
      thinkingPre = thinkingDiv.querySelector('pre');
    }
    return thinkingDiv;
  }

  ensureBubble();

  try {
    const resp = await fetch('/stream', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg})
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || 'HTTP ' + resp.status);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          const etype = data.type;

          // --- Thinking ---
          if (etype === 'stream_event' && data.event) {
            const ev = data.event;
            if (ev.type === 'content_block_delta' && ev.delta) {
              if (ev.delta.type === 'thinking_delta') {
                ensureThinking();
                thinkingText += ev.delta.thinking;
                thinkingPre.textContent = thinkingText;
                scrollDown();
              } else if (ev.delta.type === 'text_delta') {
                ensureBubble();
                if (firstChunk) { currentBubble.innerHTML = ''; firstChunk = false; }
                fullText += ev.delta.text;
                try { currentBubble.innerHTML = marked.parse(fullText); } catch(e) { currentBubble.textContent = fullText; }
                scrollDown();
              } else if (ev.delta.type === 'input_json_delta') {
                // Streaming tool input - accumulate
              }
            } else if (ev.type === 'content_block_start' && ev.content_block) {
              const cb = ev.content_block;
              if (cb.type === 'tool_use') {
                // Start of a tool call
                const toolBlock = createToolBlock(msgDiv, cb.name, cb.id);
                activeToolBlocks[cb.id] = {block: toolBlock, jsonText: ''};
              }
            }
          }

          // --- Full assistant message (accumulated) ---
          if (etype === 'assistant' && data.message && data.message.content) {
            // The final state of the message - we already have the deltas, skip
          }

          // --- Result ---
          if (etype === 'result') {
            if (data.is_error) {
              ensureBubble();
              currentBubble.innerHTML = '<span style="color:#e94560">' + escapeHtml(data.result || 'Error') + '</span>';
            }
          }

          // --- Error ---
          if (etype === 'error') {
            ensureBubble();
            currentBubble.innerHTML = '<span style="color:#e94560">' + escapeHtml(data.text) + '</span>';
          }

          // --- Stderr (debug) ---
          if (etype === 'stderr' && data.text && data.text.trim()) {
            console.log('Claude stderr:', data.text);
          }

        } catch(e) { console.error('SSE parse error:', e); }
      }
    }
  } catch(e) {
    ensureBubble();
    currentBubble.innerHTML = '<span style="color:#e94560">连接错误: ' + escapeHtml(e.message) + '</span>';
  }

  // Auto-collapse thinking when done
  if (thinkingDiv && thinkingText.length < 200) {
    thinkingDiv.querySelector('.tool-result').classList.add('open');
    thinkingDiv.querySelector('.tool-use').classList.add('expanded');
  }

  isStreaming = false;
  $('sendBtn').disabled = false;
  $('sendBtn').textContent = '发送';
  $('messageInput').disabled = false;
  $('messageInput').focus();
}

function appendUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'message user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = escapeHtml(text);
  div.appendChild(bubble);
  $('messages').appendChild(div);
  scrollDown();
}

function createToolBlock(parentDiv, toolName, toolId) {
  const block = document.createElement('div');
  block.className = 'tool-block';
  block.dataset.toolId = toolId;
  const icon = toolName === 'Bash' ? '⚡' : toolName === 'Read' ? '📄' : toolName === 'Write' ? '✏️' : toolName === 'Edit' ? '🔧' : toolName === 'Glob' ? '🔍' : toolName === 'Grep' ? '🔎' : '🔨';
  block.innerHTML = `
    <div class="tool-use" onclick="toggleTool(this)">
      <span class="icon">${icon}</span>
      <span class="info">
        <span class="name">${escapeHtml(toolName)}</span>
      </span>
      <span class="arrow">▶</span>
    </div>
    <div class="tool-result"><pre></pre></div>
  `;
  parentDiv.appendChild(block);
  scrollDown();
  return block;
}

function toggleTool(header) {
  header.classList.toggle('expanded');
  header.parentElement.querySelector('.tool-result').classList.toggle('open');
}

function scrollDown() {
  const m = $('messages');
  m.scrollTop = m.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Auto-resize textarea
$('messageInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});

// Init
{% if logged_in %}
showChat();
{% else %}
showLogin();
{% endif %}
</script>
</body>
</html>
